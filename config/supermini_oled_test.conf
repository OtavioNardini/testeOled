# SuperMini NRF52840 — OLED Display Test Kconfig
# Place this file as: config/<your_keyboard>.conf
# or merge into your existing .conf file.

# ---------- Display core ----------
CONFIG_ZMK_DISPLAY=y

# Use the built-in status screen (shows layer, WPM, battery, BT status)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Invert display colors (white-on-black). Set =n for black-on-white.
CONFIG_ZMK_DISPLAY_INVERT=n

# Work queue: dedicated thread avoids blocking BLE/HID tasks
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# ---------- LVGL (ZMK's display framework) ----------
CONFIG_LVGL=y
CONFIG_LVGL_USE_LABEL=y
CONFIG_LVGL_USE_CONT=y
CONFIG_LVGL_USE_IMG=y

# Buffer depth — 1 bit per pixel is enough for monochrome OLEDs
CONFIG_LVGL_BITS_PER_PIXEL=1
CONFIG_LVGL_COLOR_DEPTH_1=y

# Screen resolution (must match your overlay width/height)
CONFIG_LVGL_HOR_RES_MAX=128
CONFIG_LVGL_VER_RES_MAX=32   # Change to 64 for 128x64 panels

# ---------- SSD1306 driver ----------
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# ---------- I2C ----------
CONFIG_I2C=y

# ---------- External power (VCC cutoff — SuperMini specific) ----------
# This lets ZMK cut power to the OLED during deep sleep, saving battery.
# Pairs with the ext_power node in the .overlay file.
CONFIG_ZMK_EXT_POWER=y

# ---------- Battery reporting ----------
# SuperMini uses VDDH sensing (same as nice!nano).
# If you're on the 52840nano variant, you need a voltage-divider patch instead.
CONFIG_ZMK_BATTERY_REPORTING=y

# ---------- Optional: WPM counter on display ----------
# Uncomment if your status screen shows WPM
# CONFIG_ZMK_WPM=y

# ---------- Deep sleep ----------
# Recommended to keep battery life reasonable on SuperMini.
# Note: Stock SuperMini leaks ~700uA in deep sleep due to the 5.6K pull-up.
# Replace/remove that resistor before relying on deep sleep for battery life.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000  # 15 minutes in ms
